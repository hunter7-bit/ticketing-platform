# This file defines our entire multi-container architecture.

services:
  # 1. THE MAIN API SERVER
  api:
    build: ./ticketing-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./ticketing-backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:supersecret@postgres:5432/ticketing_db
      - REDIS_URL=redis://redis:6379/0

  # 2. THE BACKGROUND WORKER
  worker:
    build: ./ticketing-backend
    command: python -m app.workers.lock_manager
    volumes:
      - ./ticketing-backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:supersecret@postgres:5432/ticketing_db
      - REDIS_URL=redis://redis:6379/0

  # 3. THE POSTGRESQL DATABASE
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_DB=ticketing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 4. THE REDIS CACHE & MESSAGE BROKER
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # 5. THE REACT FRONTEND
  frontend:
    build: ./ticketing-frontend
    ports:
      - "5173:5173"
    # Temporarily commented out to ensure smooth building on Windows
    # volumes:
    #   - ./ticketing-frontend:/app
    #   - /app/node_modules
    depends_on:
      - api

# Define the persistent storage volume for Postgres
volumes:
  postgres_data: